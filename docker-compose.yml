services:
  crash-trend:
    build: .
    container_name: crash-trend
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
    volumes:
      # 整個 repo 掛進去：程式碼、apps.yaml、reports/、dashboard.html 都留在 host（git 可管）
      - .:/app
      # 憑證 read-only 掛載 —— 絕不進 image / registry
      # host 端放：~/.config/crash-trend/sa.json（BigQuery SA）
      - ~/.config/crash-trend:/root/.config/crash-trend:ro
      # firebase user token（fetch_stacktraces.py 用；SA 打 Crashlytics 一律 404 只能 user token）。
      # rw：CLI 會寫回 motd 快取／token 更新；host 端此目錄只放 firebase-tools.json
      - ~/.config/configstore:/root/.config/configstore
    # GEMINI_API_KEY / GEMINI_MODEL 放 repo 根目錄 .env（gitignored），
    # weekly_sync.sh 會自行 source，不需在此宣告

  # 儀表板靜態服務：http://<主機>:8787（bind mount，週同步重產後自動生效）
  dashboard:
    image: nginx:alpine
    container_name: crash-trend-dashboard
    restart: unless-stopped
    ports:
      - "8787:80"
    volumes:
      - ./dashboard.html:/usr/share/nginx/html/index.html:ro
